name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Build APK
        run: |
          npm i -g cordova@latest
          cordova create app com.neogridlock.game "Neon Gridlock"
          cd app
          # Adicionando a plataforma 14 para suportar API 35
          cordova platform add android@14.0.0
          
          # Copiando seus arquivos (com espaços corretos entre os pontos)
          cp -r ../* www/ || true
          
          # Ajustes automáticos para evitar tela branca/preta
          sed -i 's/src=".\/game.js"/src="game.js"/g' www/index.html
          sed -i 's/href=".\/style.css"/href="style.css"/g' www/index.html
          sed -i '/<head>/a \    <script src="cordova.js"></script>' www/index.html
          
          # Forçando a API 35 no config.xml
          sed -i '/<\/widget>/i \    <preference name="android-targetSdkVersion" value="35" />' config.xml
          sed -i '/<\/widget>/i \    <preference name="Scheme" value="https" />' config.xml
          sed -i '/<\/widget>/i \    <preference name="Hostname" value="localhost" />' config.xml
          
          cordova build android --release -- --packageType=apk
          
      - uses: actions/upload-artifact@v4
        with:
          name: Neon-Gridlock-APK
          path: app/platforms/android/app/build/outputs/apk/release/*.apk
